<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #log {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🔍 Button Click Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Simple Button Click</h2>
        <button id="testBtn1">Click Me</button>
        <p id="result1"></p>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Check if getRecommendationBtn exists</h2>
        <button onclick="checkButton()">Check Button</button>
        <p id="result2"></p>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Check if form exists</h2>
        <button onclick="checkForm()">Check Form</button>
        <p id="result3"></p>
    </div>
    
    <div class="test-section">
        <h2>Console Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <div id="log"></div>
    </div>
    
    <script>
        const log = document.getElementById('log');
        
        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] ${message}<br>`;
            log.scrollTop = log.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            log.innerHTML = '';
        }
        
        // Test 1: Simple button
        document.getElementById('testBtn1').addEventListener('click', function() {
            addLog('Test button clicked!');
            document.getElementById('result1').textContent = '✅ Button works!';
        });
        
        // Test 2: Check button
        function checkButton() {
            const btn = document.getElementById('getRecommendationBtn');
            if (btn) {
                addLog('✅ getRecommendationBtn found!');
                document.getElementById('result2').innerHTML = 
                    '✅ Button found!<br>ID: ' + btn.id + '<br>Type: ' + btn.type + '<br>Text: ' + btn.textContent;
            } else {
                addLog('❌ getRecommendationBtn NOT found!');
                document.getElementById('result2').innerHTML = '❌ Button not found!';
            }
        }
        
        // Test 3: Check form
        function checkForm() {
            const form = document.getElementById('soilTestForm');
            if (form) {
                addLog('✅ soilTestForm found!');
                document.getElementById('result3').innerHTML = 
                    '✅ Form found!<br>ID: ' + form.id;
            } else {
                addLog('❌ soilTestForm NOT found!');
                document.getElementById('result3').innerHTML = '❌ Form not found!';
            }
        }
        
        // Monitor for errors
        window.addEventListener('error', function(e) {
            addLog('❌ JavaScript Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
        });
        
        // Check on load
        window.addEventListener('load', function() {
            addLog('Page loaded');
            setTimeout(() => {
                checkButton();
                checkForm();
            }, 1000);
        });
    </script>
</body>
</html>
