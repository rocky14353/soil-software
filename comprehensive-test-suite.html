<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Test Suite - Soil Fertilizer Recommendation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .test-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .test-results {
            display: grid;
            gap: 15px;
        }
        .test-category {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 5px solid #667eea;
        }
        .test-category h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .test-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        .test-item:hover {
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .test-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1em;
        }
        .test-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        .status-pass {
            background: #d4edda;
            color: #155724;
        }
        .status-fail {
            background: #f8d7da;
            color: #721c24;
        }
        .status-skip {
            background: #fff3cd;
            color: #856404;
        }
        .test-details {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }
        .test-input {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 5px;
            margin: 5px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .test-expected {
            color: #27ae60;
            font-weight: 600;
        }
        .test-actual {
            color: #e74c3c;
            font-weight: 600;
        }
        .test-error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .collapsible {
            cursor: pointer;
            user-select: none;
        }
        .collapsible::before {
            content: '▼ ';
            display: inline-block;
            transition: transform 0.3s;
        }
        .collapsible.collapsed::before {
            transform: rotate(-90deg);
        }
        .test-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .test-content.collapsed {
            max-height: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Comprehensive Test Suite</h1>
        <p class="subtitle">World-Class Testing for Soil Fertilizer Recommendation System</p>
        
        <div class="test-controls">
            <button class="btn-primary" onclick="runAllTests()">▶ Run All Tests</button>
            <button class="btn-success" onclick="runQuickTests()">⚡ Quick Tests</button>
            <button class="btn-warning" onclick="runDataValidationTests()">📊 Data Validation</button>
            <button class="btn-danger" onclick="clearResults()">🗑️ Clear Results</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%">0%</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTests">0</div>
                <div class="stat-label">Total Tests</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #27ae60, #2ecc71);">
                <div class="stat-value" id="passedTests">0</div>
                <div class="stat-label">Passed</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">
                <div class="stat-value" id="failedTests">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #f39c12, #e67e22);">
                <div class="stat-value" id="skippedTests">0</div>
                <div class="stat-label">Skipped</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #3498db, #2980b9);">
                <div class="stat-value" id="coverage">0%</div>
                <div class="stat-label">Coverage</div>
            </div>
        </div>

        <div class="test-results" id="testResults"></div>
    </div>

    <script>
        // Load the main script functions (we'll need to import them)
        // For now, we'll include the test logic inline
        
        let testResults = {
            total: 0,
            passed: 0,
            failed: 0,
            skipped: 0,
            tests: []
        };

        // Test Data from CSV Files
        const testData = {
            // From Data 3 - Soil Test Parameters
            classification: {
                n: {
                    low: { oc: 0.4, expected: 'low' },
                    medium: { oc: 0.6, expected: 'medium' },
                    high: { oc: 0.8, expected: 'high' },
                    boundary1: { oc: 0.5, expected: 'medium' },
                    boundary2: { oc: 0.75, expected: 'medium' },
                    boundary3: { oc: 0.749, expected: 'medium' },
                    boundary4: { oc: 0.751, expected: 'high' }
                },
                p: {
                    low: { value: 8, expected: 'low' },
                    medium: { value: 15, expected: 'medium' },
                    high: { value: 30, expected: 'high' },
                    boundary1: { value: 10, expected: 'medium' },
                    boundary2: { value: 24, expected: 'medium' },
                    boundary3: { value: 9.9, expected: 'low' },
                    boundary4: { value: 24.1, expected: 'high' }
                },
                k: {
                    low: { value: 50, expected: 'low' },
                    medium: { value: 100, expected: 'medium' },
                    high: { value: 150, expected: 'high' },
                    boundary1: { value: 58, expected: 'medium' },
                    boundary2: { value: 138, expected: 'medium' },
                    boundary3: { value: 57.9, expected: 'low' },
                    boundary4: { value: 138.1, expected: 'high' }
                },
                s: {
                    low: { value: 8, expected: 'low' },
                    medium: { value: 12, expected: 'medium' },
                    high: { value: 18, expected: 'high' },
                    boundary1: { value: 10, expected: 'medium' },
                    boundary2: { value: 15, expected: 'medium' },
                    boundary3: { value: 9.9, expected: 'low' },
                    boundary4: { value: 15.1, expected: 'high' }
                }
            },
            // From Data 2 - Example: Paddy Rabi, North Coastal, N-Medium, P-Low, K-High
            locationRecommendations: {
                paddyRabiNorthCoastal: {
                    nStatus: 'medium',
                    pStatus: 'low',
                    kStatus: 'high',
                    expected: { n: 48, p: 32, k: 13 }
                },
                paddyKharifNorthCoastal: {
                    nStatus: 'medium',
                    pStatus: 'low',
                    kStatus: 'high',
                    expected: { n: 32, p: 32, k: 13 }
                }
            },
            // From Data1 - Fertilizer Conversions
            conversions: {
                p2o5ToGromor: {
                    '14-35-14_20': { p2o5: 20, product: '14-35-14', expected: 57.1 },
                    '28-28-0_20': { p2o5: 20, product: '28-28-0', expected: 71.4 },
                    '20-20-0-13_10': { p2o5: 10, product: '20-20-0-13', expected: 50 }
                },
                nToStraight: {
                    urea_20: { n: 20, product: 'urea', expected: 43.5 },
                    urea_17: { n: 17, product: 'urea', expected: 37.4 }
                },
                k2oToStraight: {
                    mop_13: { k2o: 13, product: 'mop', expected: 21.7 },
                    mop_15: { k2o: 15, product: 'mop', expected: 25.0 }
                }
            },
            // From Data 4 - Example Soil Test
            exampleSoilTest: {
                oc: 0.4,
                n: 140,
                p: 30,
                k: 100,
                s: 9,
                ph: 7.3,
                expected: {
                    nStatus: 'low',
                    pStatus: 'high',
                    kStatus: 'medium',
                    sStatus: 'low'
                }
            }
        };

        // Classification Functions (from script.js)
        function classifyNitrogenByOC(organicCarbon) {
            if (organicCarbon < 0.5) return 'low';
            if (organicCarbon <= 0.75) return 'medium';
            return 'high';
        }

        function classifyPhosphorus(p2o5) {
            if (p2o5 < 10) return 'low';
            if (p2o5 <= 24) return 'medium';
            return 'high';
        }

        function classifyPotassium(k2o) {
            if (k2o < 58) return 'low';
            if (k2o <= 138) return 'medium';
            return 'high';
        }

        function classifySulfur(sulfur) {
            if (!sulfur || sulfur < 10) return 'low';
            if (sulfur <= 15) return 'medium';
            return 'high';
        }

        // Test Runner
        function runTest(testName, testFunction, category = 'General') {
            testResults.total++;
            const test = {
                name: testName,
                category: category,
                status: 'running',
                error: null,
                details: {}
            };

            try {
                const result = testFunction();
                if (result === true || (result && result.passed)) {
                    test.status = 'pass';
                    testResults.passed++;
                } else {
                    test.status = 'fail';
                    testResults.failed++;
                    test.error = result.error || 'Test failed';
                    test.details = result.details || {};
                }
            } catch (error) {
                test.status = 'fail';
                testResults.failed++;
                test.error = error.message;
            }

            testResults.tests.push(test);
            return test;
        }

        // Test Categories
        function runClassificationTests() {
            const category = 'Soil Test Classification';
            
            // N Classification Tests
            Object.entries(testData.classification.n).forEach(([name, data]) => {
                runTest(`N Classification: ${name}`, () => {
                    const result = classifyNitrogenByOC(data.oc);
                    return result === data.expected ? true : {
                        passed: false,
                        details: { expected: data.expected, actual: result, input: data.oc }
                    };
                }, category);
            });

            // P Classification Tests
            Object.entries(testData.classification.p).forEach(([name, data]) => {
                runTest(`P Classification: ${name}`, () => {
                    const result = classifyPhosphorus(data.value);
                    return result === data.expected ? true : {
                        passed: false,
                        details: { expected: data.expected, actual: result, input: data.value }
                    };
                }, category);
            });

            // K Classification Tests
            Object.entries(testData.classification.k).forEach(([name, data]) => {
                runTest(`K Classification: ${name}`, () => {
                    const result = classifyPotassium(data.value);
                    return result === data.expected ? true : {
                        passed: false,
                        details: { expected: data.expected, actual: result, input: data.value }
                    };
                }, category);
            });

            // S Classification Tests
            Object.entries(testData.classification.s).forEach(([name, data]) => {
                runTest(`S Classification: ${name}`, () => {
                    const result = classifySulfur(data.value);
                    return result === data.expected ? true : {
                        passed: false,
                        details: { expected: data.expected, actual: result, input: data.value }
                    };
                }, category);
            });

            // Real Example from Data 4
            runTest('Real Example: Data 4 Soil Test', () => {
                const oc = testData.exampleSoilTest.oc;
                const n = testData.exampleSoilTest.n;
                const p = testData.exampleSoilTest.p;
                const k = testData.exampleSoilTest.k;
                const s = testData.exampleSoilTest.s;

                const nStatus = classifyNitrogenByOC(oc);
                const pStatus = classifyPhosphorus(p);
                const kStatus = classifyPotassium(k);
                const sStatus = classifySulfur(s);

                const expected = testData.exampleSoilTest.expected;
                const allMatch = 
                    nStatus === expected.nStatus &&
                    pStatus === expected.pStatus &&
                    kStatus === expected.kStatus &&
                    sStatus === expected.sStatus;

                return allMatch ? true : {
                    passed: false,
                    details: {
                        expected: expected,
                        actual: { nStatus, pStatus, kStatus, sStatus },
                        input: { oc, n, p, k, s }
                    }
                };
            }, category);
        }

        function runDataValidationTests() {
            const category = 'Data Validation';
            
            // Test that all required data files are accessible
            runTest('Data Files: crops.json exists', async () => {
                try {
                    const response = await fetch('data/crops.json');
                    return response.ok ? true : { passed: false, error: 'File not found' };
                } catch (e) {
                    return { passed: false, error: e.message };
                }
            }, category);

            runTest('Data Files: fertilizer-conversion.json exists', async () => {
                try {
                    const response = await fetch('data/fertilizer-conversion.json');
                    return response.ok ? true : { passed: false, error: 'File not found' };
                } catch (e) {
                    return { passed: false, error: e.message };
                }
            }, category);

            runTest('Data Files: locations.json exists', async () => {
                try {
                    const response = await fetch('data/locations.json');
                    return response.ok ? true : { passed: false, error: 'File not found' };
                } catch (e) {
                    return { passed: false, error: e.message };
                }
            }, category);

            runTest('Data Files: soil-test-classification.json exists', async () => {
                try {
                    const response = await fetch('data/soil-test-classification.json');
                    return response.ok ? true : { passed: false, error: 'File not found' };
                } catch (e) {
                    return { passed: false, error: e.message };
                }
            }, category);
        }

        function runConversionTests() {
            const category = 'Fertilizer Conversions';
            
            // These would need the actual conversion functions from script.js
            // For now, we'll test the logic
            
            runTest('Conversion: P2O5 to 14-35-14 (20 kg)', () => {
                // Expected: 57.1 kgs for 20 kg P2O5
                // This would use interpolateFromTable
                return { passed: false, error: 'Requires script.js functions' };
            }, category);
        }

        function runAllTests() {
            testResults = { total: 0, passed: 0, failed: 0, skipped: 0, tests: [] };
            document.getElementById('testResults').innerHTML = '';
            
            runClassificationTests();
            runDataValidationTests();
            runConversionTests();
            
            updateStats();
            renderResults();
        }

        function runQuickTests() {
            testResults = { total: 0, passed: 0, failed: 0, skipped: 0, tests: [] };
            document.getElementById('testResults').innerHTML = '';
            
            runClassificationTests();
            updateStats();
            renderResults();
        }

        function runDataValidationTests() {
            testResults = { total: 0, passed: 0, failed: 0, skipped: 0, tests: [] };
            document.getElementById('testResults').innerHTML = '';
            
            runDataValidationTests();
            updateStats();
            renderResults();
        }

        function updateStats() {
            document.getElementById('totalTests').textContent = testResults.total;
            document.getElementById('passedTests').textContent = testResults.passed;
            document.getElementById('failedTests').textContent = testResults.failed;
            document.getElementById('skippedTests').textContent = testResults.skipped;
            
            const coverage = testResults.total > 0 
                ? Math.round((testResults.passed / testResults.total) * 100) 
                : 0;
            document.getElementById('coverage').textContent = coverage + '%';
            
            const progress = testResults.total > 0 
                ? Math.round(((testResults.passed + testResults.failed) / testResults.total) * 100) 
                : 0;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').textContent = progress + '%';
        }

        function renderResults() {
            const container = document.getElementById('testResults');
            const categories = {};
            
            testResults.tests.forEach(test => {
                if (!categories[test.category]) {
                    categories[test.category] = [];
                }
                categories[test.category].push(test);
            });

            Object.entries(categories).forEach(([category, tests]) => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'test-category';
                
                const passed = tests.filter(t => t.status === 'pass').length;
                const failed = tests.filter(t => t.status === 'fail').length;
                
                categoryDiv.innerHTML = `
                    <h3 class="collapsible" onclick="toggleCategory(this)">${category} (${passed}/${tests.length} passed)</h3>
                    <div class="test-content">
                        ${tests.map(test => renderTest(test)).join('')}
                    </div>
                `;
                
                container.appendChild(categoryDiv);
            });
        }

        function renderTest(test) {
            const statusClass = `status-${test.status}`;
            const statusText = test.status === 'pass' ? '✓ PASS' : test.status === 'fail' ? '✗ FAIL' : '⊘ SKIP';
            
            let detailsHtml = '';
            if (test.error) {
                detailsHtml += `<div class="test-error">Error: ${test.error}</div>`;
            }
            if (test.details && Object.keys(test.details).length > 0) {
                detailsHtml += `<div class="test-details">`;
                if (test.details.expected) {
                    detailsHtml += `<div class="test-expected">Expected: ${JSON.stringify(test.details.expected)}</div>`;
                }
                if (test.details.actual) {
                    detailsHtml += `<div class="test-actual">Actual: ${JSON.stringify(test.details.actual)}</div>`;
                }
                if (test.details.input) {
                    detailsHtml += `<div class="test-input">Input: ${JSON.stringify(test.details.input)}</div>`;
                }
                detailsHtml += `</div>`;
            }
            
            return `
                <div class="test-item">
                    <div class="test-header">
                        <div class="test-name">${test.name}</div>
                        <div class="test-status ${statusClass}">${statusText}</div>
                    </div>
                    ${detailsHtml}
                </div>
            `;
        }

        function toggleCategory(element) {
            element.classList.toggle('collapsed');
            const content = element.nextElementSibling;
            content.classList.toggle('collapsed');
        }

        function clearResults() {
            testResults = { total: 0, passed: 0, failed: 0, skipped: 0, tests: [] };
            document.getElementById('testResults').innerHTML = '';
            updateStats();
        }

        // Initialize
        updateStats();
    </script>
</body>
</html>
