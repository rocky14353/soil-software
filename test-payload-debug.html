<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Payload Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error {
            color: red;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            color: green;
            background: #e6ffe6;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Test Payload Debug</h1>
    
    <div class="section">
        <h2>Test Payload</h2>
        <pre id="payloadDisplay"></pre>
    </div>
    
    <div class="section">
        <button onclick="testPayload()">Test Payload</button>
    </div>
    
    <div class="section">
        <h2>Results</h2>
        <div id="results"></div>
    </div>

    <script src="script.js"></script>
    <script>
        const testPayload = {
            "crop": "Paddy lowland",
            "organicCarbon": 0.6,
            "nitrogen": 150,
            "phosphorus": 9,
            "potassium": 50,
            "season": "Rabi",
            "fieldType": "Irrigated",
            "location": "SOUTH TELENGANA",
            "soilType": "Medium",
            "sulfur": 9,
            "ph": 7.5,
            "ec": 0.6,
            "calcium": 20,
            "magnesium": 50,
            "zinc": 5,
            "boron": 0.5,
            "manganese": 20,
            "iron": 50,
            "copper": 20,
            "molybdenum": 0.5,
            "chlorine": 9.8,
            "gromorCombination": "Auto-select based on Location",
            "preferences": {
                "28-28-0": "Optional",
                "14-35-14": "Optional",
                "20-20-0": "Optional",
                "10-26-26": "Optional",
                "16-20-0": "Optional",
                "Urea": "Optional",
                "MOP": "Optional",
                "SOP": "Optional",
                "SSP": "Optional"
            }
        };

        document.getElementById('payloadDisplay').textContent = JSON.stringify(testPayload, null, 2);

        async function testPayload() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing...</p>';

            try {
                // Wait for data to load
                if (typeof loadData === 'function') {
                    await loadData();
                }

                // Check if location data is loaded
                if (typeof locationCropRecommendations === 'undefined') {
                    resultsDiv.innerHTML = '<div class="error">ERROR: locationCropRecommendations is not loaded!</div>';
                    return;
                }

                // Check crop key
                const cropKey = getCropKey(testPayload.crop, testPayload.season);
                resultsDiv.innerHTML += `<div class="section"><strong>Crop Key:</strong> ${cropKey}</div>`;

                // Check if location exists
                if (!locationCropRecommendations[cropKey]) {
                    resultsDiv.innerHTML += `<div class="error">ERROR: Crop key "${cropKey}" not found in locationCropRecommendations!</div>`;
                    resultsDiv.innerHTML += `<div>Available keys: ${Object.keys(locationCropRecommendations).join(', ')}</div>`;
                    return;
                }

                // Check if location exists for this crop
                if (!locationCropRecommendations[cropKey][testPayload.location]) {
                    resultsDiv.innerHTML += `<div class="error">ERROR: Location "${testPayload.location}" not found for crop key "${cropKey}"!</div>`;
                    resultsDiv.innerHTML += `<div>Available locations: ${Object.keys(locationCropRecommendations[cropKey]).join(', ')}</div>`;
                    return;
                }

                resultsDiv.innerHTML += `<div class="success">✓ Location data found!</div>`;

                // Try to get location recommendation
                const nStatus = classifyNitrogenByOC(testPayload.organicCarbon, testPayload.nitrogen);
                const pStatus = classifyPhosphorus(testPayload.phosphorus);
                const kStatus = classifyPotassium(testPayload.potassium);

                resultsDiv.innerHTML += `<div class="section">
                    <strong>Soil Status:</strong><br>
                    N: ${nStatus}<br>
                    P: ${pStatus}<br>
                    K: ${kStatus}
                </div>`;

                const locationRec = getLocationBasedRecommendation(
                    testPayload.crop,
                    testPayload.season,
                    testPayload.location,
                    testPayload.fieldType,
                    nStatus,
                    pStatus,
                    kStatus
                );

                if (!locationRec) {
                    resultsDiv.innerHTML += `<div class="error">ERROR: getLocationBasedRecommendation returned null!</div>`;
                    return;
                }

                resultsDiv.innerHTML += `<div class="success">
                    ✓ Location recommendation found!<br>
                    N: ${locationRec.n}<br>
                    P: ${locationRec.p}<br>
                    K: ${locationRec.k}
                </div>`;

                // Try full calculation
                resultsDiv.innerHTML += `<div class="section"><strong>Running full calculation...</strong></div>`;
                const results = calculateRecommendations(testPayload);
                
                resultsDiv.innerHTML += `<div class="success">
                    ✓ Calculation successful!<br>
                    Total N: ${results.totalRequirements?.n || 'N/A'}<br>
                    Total P: ${results.totalRequirements?.p || 'N/A'}<br>
                    Total K: ${results.totalRequirements?.k || 'N/A'}<br>
                    Stages: ${results.stageRecommendations?.length || 0}
                </div>`;

                resultsDiv.innerHTML += `<pre>${JSON.stringify(results, null, 2)}</pre>`;

            } catch (error) {
                resultsDiv.innerHTML += `<div class="error">
                    <strong>ERROR:</strong> ${error.message}<br>
                    <pre>${error.stack}</pre>
                </div>`;
            }
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testPayload();
            }, 1000);
        });
    </script>
</body>
</html>
