<!DOCTYPE html>
<html>
<head><title>JS Error Check</title></head>
<body>
<div id="out" style="font-family:monospace;font-size:14px;padding:20px;"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
    document.getElementById('out').innerHTML =
        '<span style="color:red;font-size:16px;font-weight:bold">SYNTAX ERROR FOUND:</span><br>' +
        'Message: ' + msg + '<br>' +
        'Line: ' + line + '<br>' +
        'Column: ' + col + '<br><br>' +
        '<b>This is the exact line in script.js that broke the file.</b>';
    return true;
};
</script>
<script src="script.js"></script>
<script>
var out = document.getElementById('out');
if (!out.innerHTML) {
    out.innerHTML =
        '<span style="color:green;font-size:16px;font-weight:bold">NO SYNTAX ERROR - script.js loaded OK</span><br><br>' +
        'handleFormSubmission: <b>' + typeof handleFormSubmission + '</b><br>' +
        'calculateRecommendations: <b>' + typeof calculateRecommendations + '</b><br>' +
        '_runFormSubmission: <b>' + typeof _runFormSubmission + '</b>';
}
</script>
</body>
</html>
