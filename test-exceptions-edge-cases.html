<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exceptions Edge Cases Test Suite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-case {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        .test-case.pass {
            border-left: 5px solid #4CAF50;
        }
        .test-case.fail {
            border-left: 5px solid #f44336;
        }
        .test-case.pending {
            border-left: 5px solid #ff9800;
        }
        .test-title {
            font-weight: bold;
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }
        .test-details {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .pass { background: #e8f5e9; color: #2e7d32; }
        .fail { background: #ffebee; color: #c62828; }
        .summary {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #1976D2;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Exceptions Edge Cases Test Suite</h1>
    <button onclick="runAllTests()">Run All Tests</button>
    <div id="summary" class="summary"></div>
    <div id="testResults"></div>

    <script src="script.js"></script>
    <script>
        let testResults = [];
        
        // Test data
        const testCases = [
            {
                id: 'test1',
                name: 'Condition 1: N Classification (OC Fallback)',
                description: 'When N is not provided, should use OC for classification',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: null, // Not provided
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    nStatus: 'low', // OC 0.4% < 0.5% = LOW
                    usesOC: true
                }
            },
            {
                id: 'test2',
                name: 'Condition 3: 100% P Basal = SSP Only',
                description: 'When 100% P is at basal, should use SSP exclusively',
                input: {
                    crop: 'Maize',
                    organicCarbon: 0.6,
                    nitrogen: 120,
                    phosphorus: 20,
                    potassium: 60,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'NORTH COASTAL',
                    sulfur: 10,
                    ph: 7.0
                },
                expected: {
                    hasSSP: true,
                    sspAtBasal: true,
                    noSSPAtStage2: true
                }
            },
            {
                id: 'test3',
                name: 'Condition 4: SSP Always at Basal (Never at Stage 2)',
                description: 'SSP should only appear at basal, never at stage 2',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: 150,
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    noSSPAtStage2: true,
                    sspOnlyAtBasal: true
                }
            },
            {
                id: 'test4',
                name: 'Condition 5: Paddy P Split 70/30',
                description: 'Paddy should have 70% P at basal, 30% at tillering',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: 150,
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    pSplitRatio: [0.7, 0.3],
                    basalPPercent: 70,
                    stage2PPercent: 30
                }
            },
            {
                id: 'test5',
                name: 'Condition 6: High P at Basal, Low P at 2nd Stage',
                description: 'Basal should use high P (14-35-14), stage 2 should use low P (20-20-0-13, 16-20-0-13, 28-28-0)',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: 150,
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    basalHasHighP: true,
                    stage2HasLowP: true,
                    noSSPAtStage2: true
                }
            },
            {
                id: 'test6',
                name: 'Condition 8: Paddy N Equal Splits (33.33% each)',
                description: 'Paddy N should be split equally: 33.33% / 33.33% / 33.33%',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: 150,
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    nSplitRatio: [0.3333, 0.3333, 0.3333],
                    equalSplits: true
                }
            },
            {
                id: 'test7',
                name: 'Condition 7: Paddy K Split 50/50',
                description: 'Paddy K should be 50% basal, 50% panicle',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: 150,
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    kSplitRatio: [0.5, 0.5],
                    basalKPercent: 50,
                    panicleKPercent: 50
                }
            },
            {
                id: 'test8',
                name: 'Condition 2: P Calculated First',
                description: 'P should be calculated before N and K adjustments',
                input: {
                    crop: 'Paddy lowland',
                    organicCarbon: 0.4,
                    nitrogen: 150,
                    phosphorus: 9,
                    potassium: 70,
                    season: 'Rabi',
                    fieldType: 'Irrigated',
                    location: 'SOUTH TELENGANA',
                    sulfur: 15,
                    ph: 7.5
                },
                expected: {
                    pCalculatedFirst: true,
                    nAdjustedAfterP: true
                }
            }
        ];

        async function runAllTests() {
            testResults = [];
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<p>Running tests...</p>';

            for (const testCase of testCases) {
                const result = await runTest(testCase);
                testResults.push(result);
                displayTestResult(result);
            }

            displaySummary();
        }

        async function runTest(testCase) {
            try {
                // Prepare form data
                const formData = {
                    crop: testCase.input.crop,
                    organicCarbon: testCase.input.organicCarbon,
                    nitrogen: testCase.input.nitrogen !== null ? testCase.input.nitrogen : '',
                    phosphorus: testCase.input.phosphorus,
                    potassium: testCase.input.potassium,
                    season: testCase.input.season,
                    fieldType: testCase.input.fieldType,
                    location: testCase.input.location,
                    sulfur: testCase.input.sulfur,
                    ph: testCase.input.ph,
                    gromorCombination: 'Auto-select based on Location',
                    pref_28_28_0: 'Optional',
                    pref_14_35_14: 'Optional',
                    pref_20_20_0: 'Optional',
                    pref_10_26_26: 'Optional',
                    pref_16_20_0: 'Optional',
                    pref_Urea: 'Optional',
                    pref_MOP: 'Optional',
                    pref_SOP: 'Optional',
                    pref_SSP: 'Optional'
                };

                // Calculate recommendations
                const results = calculateRecommendations(formData);
                
                // Verify expectations
                const checks = verifyExpectations(testCase, results);
                
                return {
                    ...testCase,
                    status: checks.allPass ? 'pass' : 'fail',
                    results: results,
                    checks: checks
                };
            } catch (error) {
                return {
                    ...testCase,
                    status: 'fail',
                    error: error.message,
                    checks: { allPass: false, errors: [error.message] }
                };
            }
        }

        function verifyExpectations(testCase, results) {
            const checks = {
                allPass: true,
                details: [],
                errors: []
            };

            // Test 1: N Classification (OC Fallback)
            if (testCase.id === 'test1') {
                const nStatus = results.nutrientAnalysis?.nitrogen?.status;
                if (nStatus === 'low') {
                    checks.details.push('✅ N status correctly uses OC (0.4% = LOW)');
                } else {
                    checks.allPass = false;
                    checks.errors.push(`❌ Expected N status 'low', got '${nStatus}'`);
                }
            }

            // Test 3: SSP Always at Basal
            if (testCase.id === 'test3' || testCase.id === 'test4' || testCase.id === 'test5') {
                let sspAtBasal = false;
                let sspAtStage2 = false;
                
                results.recommendations?.forEach((stage, index) => {
                    stage.fertilizers?.forEach(fert => {
                        if (fert.name === 'SSP') {
                            if (index === 0) {
                                sspAtBasal = true;
                            } else {
                                sspAtStage2 = true;
                            }
                        }
                    });
                });

                if (!sspAtStage2) {
                    checks.details.push('✅ SSP not used at stage 2');
                } else {
                    checks.allPass = false;
                    checks.errors.push('❌ SSP found at stage 2 (should only be at basal)');
                }
            }

            // Test 4: Paddy P Split 70/30
            if (testCase.id === 'test4') {
                const expectedNPK = results.expectedNPKPerStage;
                if (expectedNPK && expectedNPK.length >= 2) {
                    const totalP = expectedNPK.reduce((sum, s) => sum + (s.expectedP || 0), 0);
                    const basalP = expectedNPK[0]?.expectedP || 0;
                    const stage2P = expectedNPK[1]?.expectedP || 0;
                    const basalPercent = totalP > 0 ? (basalP / totalP) * 100 : 0;
                    const stage2Percent = totalP > 0 ? (stage2P / totalP) * 100 : 0;

                    if (Math.abs(basalPercent - 70) < 5 && Math.abs(stage2Percent - 30) < 5) {
                        checks.details.push(`✅ P split is 70/30 (Basal: ${basalPercent.toFixed(1)}%, Stage 2: ${stage2Percent.toFixed(1)}%)`);
                    } else {
                        checks.allPass = false;
                        checks.errors.push(`❌ Expected P split 70/30, got ${basalPercent.toFixed(1)}/${stage2Percent.toFixed(1)}`);
                    }
                }
            }

            // Test 6: Paddy N Equal Splits
            if (testCase.id === 'test6') {
                const expectedNPK = results.expectedNPKPerStage;
                if (expectedNPK && expectedNPK.length === 3) {
                    const totalN = expectedNPK.reduce((sum, s) => sum + (s.expectedN || 0), 0);
                    const n1 = expectedNPK[0]?.expectedN || 0;
                    const n2 = expectedNPK[1]?.expectedN || 0;
                    const n3 = expectedNPK[2]?.expectedN || 0;
                    const percent1 = totalN > 0 ? (n1 / totalN) * 100 : 0;
                    const percent2 = totalN > 0 ? (n2 / totalN) * 100 : 0;
                    const percent3 = totalN > 0 ? (n3 / totalN) * 100 : 0;

                    if (Math.abs(percent1 - 33.33) < 5 && Math.abs(percent2 - 33.33) < 5 && Math.abs(percent3 - 33.33) < 5) {
                        checks.details.push(`✅ N split is equal: ${percent1.toFixed(1)}% / ${percent2.toFixed(1)}% / ${percent3.toFixed(1)}%`);
                    } else {
                        checks.allPass = false;
                        checks.errors.push(`❌ Expected equal N splits (33.33% each), got ${percent1.toFixed(1)}% / ${percent2.toFixed(1)}% / ${percent3.toFixed(1)}%`);
                    }
                }
            }

            // Test 7: Paddy K Split 50/50
            if (testCase.id === 'test7') {
                const expectedNPK = results.expectedNPKPerStage;
                if (expectedNPK) {
                    const totalK = expectedNPK.reduce((sum, s) => sum + (s.expectedK || 0), 0);
                    const basalK = expectedNPK[0]?.expectedK || 0;
                    const panicleK = expectedNPK[2]?.expectedK || 0;
                    const basalPercent = totalK > 0 ? (basalK / totalK) * 100 : 0;
                    const paniclePercent = totalK > 0 ? (panicleK / totalK) * 100 : 0;

                    if (Math.abs(basalPercent - 50) < 5 && Math.abs(paniclePercent - 50) < 5) {
                        checks.details.push(`✅ K split is 50/50 (Basal: ${basalPercent.toFixed(1)}%, Panicle: ${paniclePercent.toFixed(1)}%)`);
                    } else {
                        checks.allPass = false;
                        checks.errors.push(`❌ Expected K split 50/50, got ${basalPercent.toFixed(1)}/${paniclePercent.toFixed(1)}`);
                    }
                }
            }

            return checks;
        }

        function displayTestResult(result) {
            const resultsDiv = document.getElementById('testResults');
            const testDiv = document.createElement('div');
            testDiv.className = `test-case ${result.status}`;
            
            testDiv.innerHTML = `
                <div class="test-title">${result.name}</div>
                <div class="test-details">
                    <strong>Description:</strong> ${result.description}<br>
                    <strong>Status:</strong> <span class="${result.status}">${result.status.toUpperCase()}</span>
                </div>
                ${result.checks.details.length > 0 ? `
                    <div class="test-result pass">
                        <strong>✅ Passed Checks:</strong>
                        <ul>${result.checks.details.map(d => `<li>${d}</li>`).join('')}</ul>
                    </div>
                ` : ''}
                ${result.checks.errors.length > 0 ? `
                    <div class="test-result fail">
                        <strong>❌ Failed Checks:</strong>
                        <ul>${result.checks.errors.map(e => `<li>${e}</li>`).join('')}</ul>
                    </div>
                ` : ''}
                ${result.error ? `
                    <div class="test-result fail">
                        <strong>Error:</strong> ${result.error}
                    </div>
                ` : ''}
                <details>
                    <summary>View Results</summary>
                    <pre>${JSON.stringify(result.results, null, 2)}</pre>
                </details>
            `;
            
            resultsDiv.appendChild(testDiv);
        }

        function displaySummary() {
            const summaryDiv = document.getElementById('summary');
            const passed = testResults.filter(t => t.status === 'pass').length;
            const failed = testResults.filter(t => t.status === 'fail').length;
            const total = testResults.length;

            summaryDiv.innerHTML = `
                <h2>Test Summary</h2>
                <p><strong>Total Tests:</strong> ${total}</p>
                <p style="color: #4CAF50;"><strong>Passed:</strong> ${passed}</p>
                <p style="color: #f44336;"><strong>Failed:</strong> ${failed}</p>
                <p><strong>Success Rate:</strong> ${((passed / total) * 100).toFixed(1)}%</p>
            `;
        }
    </script>
</body>
</html>
